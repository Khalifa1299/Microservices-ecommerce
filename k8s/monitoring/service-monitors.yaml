
# ServiceMonitors tell Prometheus which pods to scrape and how.
# Each entry corresponds to one Django service's /metrics endpoint.

# ── Auth Service ──────────────────────────────────────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: auth-service-monitor
  namespace: ecommerce
  labels:
    release: monitoring        # must match the Helm release name
spec:
  selector:
    matchLabels:
      app: auth-service        # matches the Service label in auth-service.yaml
  endpoints:
    - port: http               # must match the Service port name
      path: /metrics
      interval: 15s
---
