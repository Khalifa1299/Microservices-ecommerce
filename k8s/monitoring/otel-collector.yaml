# _____________________________ OpenTelemetry Collector _____________________________
#
# Acts as a pipeline between Django services and Tempo.
# Receives spans over OTLP gRPC (port 4317), exports to Tempo.
#
# WHY a collector instead of sending directly to Tempo?
#   Decouples app from backend. Services always send to otel-collector:4317.
#   The collector handles batching, retries, and fan-out to multiple backends.
#   Swapping Tempo for Jaeger in future = change one line in collector config.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.99.0
        args: ["--config=/etc/otel/config.yaml"]
        ports:
        - containerPort: 4317   # OTLP gRPC receiver (Django services send here)
        - containerPort: 4318   # OTLP HTTP receiver
        - containerPort: 8888   # Collector's own Prometheus metrics
        volumeMounts:
        - name: config
          mountPath: /etc/otel
        resources:
          requests:
            memory: 128Mi
            cpu: 50m
          limits:
            memory: 256Mi
            cpu: 100m
      volumes:
      - name: config
        configMap:
          name: otel-collector-config

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

    exporters:
      otlp:
        endpoint: tempo.monitoring:4317
        tls:
          insecure: true

      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp, debug]

---

apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
spec:
  selector:
    app: otel-collector
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  - name: metrics
    port: 8888
    targetPort: 8888
