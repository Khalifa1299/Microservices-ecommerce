# ─────────────────────────────────────────────────────────────────────────────
# Kafka — single-broker KRaft deployment for local development
# Image: apache/kafka (official Apache image, no ZooKeeper needed)
#
# Two Services:
#   kafka-headless  — ClusterIP: None, gives kafka-0 a stable DNS name
#   kafka           — Regular ClusterIP, what our apps connect to
# ─────────────────────────────────────────────────────────────────────────────

# ── 1. Headless Service ───────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: ecommerce
spec:
  clusterIP: None
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  - name: controller
    port: 9093
    targetPort: 9093

---

# ── 2. Regular Service (what our apps connect to) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: ecommerce
spec:
  selector:
    app: kafka
  ports:
  - name: broker
    port: 9092
    targetPort: 9092

---

# ── 3. StatefulSet ────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: ecommerce
spec:
  serviceName: kafka-headless
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: apache/kafka:3.7.0
        ports:
        - containerPort: 9092
        - containerPort: 9093
        env:
        # ── KRaft cluster identity ────────────────────────────────────────
        # CLUSTER_ID is a fixed base64-encoded UUID required by KRaft on first
        # boot to format the storage. Using a fixed value ensures the same ID
        # is used if the pod restarts (avoids re-initialization errors).
        - name: CLUSTER_ID
          value: "MkU3OEVBNTcwNTJENDM2Qk"

        - name: KAFKA_NODE_ID
          value: "1"                    # unique broker integer ID

        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"    # single pod handles both roles

        # ── Listeners ─────────────────────────────────────────────────────
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://:9092,CONTROLLER://:9093"

        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:9092"

        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"

        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"

        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"

        # ── KRaft quorum ──────────────────────────────────────────────────
        # nodeId@host:controllerPort — must match KAFKA_NODE_ID above
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@kafka-0.kafka-headless.ecommerce.svc.cluster.local:9093"

        # ── Topic / replication settings ──────────────────────────────────
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "false"

        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"

        - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
          value: "1"

        - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
          value: "1"

        - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
          value: "0"            # speeds up consumer group formation in dev

        - name: KAFKA_LOG_RETENTION_HOURS
          value: "168"          # keep events for 7 days

        # ── Storage ───────────────────────────────────────────────────────
        - name: KAFKA_LOG_DIRS
          value: "/var/lib/kafka/data"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data

        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 30
          periodSeconds: 10

  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
