# _____________________________ Deployment for Inventory Service _____________________________

apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      initContainers:
      - name: migrate
        image: khalifa035/inventory-service:latest
        command: ["python", "manage.py", "migrate", "--noinput"]
        env:
        - name: DB_HOST
          value: inventory-db
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: inventory_db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: inventory-service-secret
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: inventory-service-secret
              key: SECRET_KEY
      containers:
      - name: inventory-service
        image: khalifa035/inventory-service:latest
        env:
        - name: DB_HOST
          value: inventory-db
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: inventory_db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: inventory-service-secret
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: inventory-service-secret
              key: SECRET_KEY
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: DEBUG
          value: "False"
        ports:
        - containerPort: 8005
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          tcpSocket:
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10

---

# _____________________________ Service for Inventory Service _____________________________

apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: ecommerce
  labels:
    app: inventory-service
spec:
  selector:
    app: inventory-service
  ports:
  - name: http
    protocol: TCP
    port: 8005
    targetPort: 8005

---

# _____________________________ Kafka Consumer for Inventory Service _____________________________
#
# Consumes orders.placed events → decrements stock for each ordered variant.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service-kafka-consumer
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service-kafka-consumer
  template:
    metadata:
      labels:
        app: inventory-service-kafka-consumer
    spec:
      containers:
      - name: kafka-consumer
        image: khalifa035/inventory-service:latest
        command: ["python", "manage.py", "inventory_consumer"]
        env:
        - name: DB_HOST
          value: inventory-db
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: inventory_db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: inventory-service-secret
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: inventory-service-secret
              key: SECRET_KEY
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka:9092"
        - name: DEBUG
          value: "False"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
