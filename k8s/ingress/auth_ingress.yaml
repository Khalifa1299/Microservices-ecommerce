apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auth-ingress
  namespace: ecommerce
  annotations:

    # ── Controller Selection ────────────────────────────────────────────────
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # ── CORS ────────────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://localhost,http://localhost:3000,http://localhost:8080"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept, X-Requested-With"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "3600"

    # ── Authentication Rate Limit (for auth endpoints) ─────────────────────
    nginx.ingress.kubernetes.io/limit-req-zone: "auth_limit"
    nginx.ingress.kubernetes.io/limit-req-burst: "10"
    nginx.ingress.kubernetes.io/limit-req-nodelay: "true"
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"

spec:
  # ── TLS ───────────────────────────────────────────────────────────────────
  ingressClassName: nginx
  tls:
    - hosts:
        - ecommerce.local
      secretName: ecommerce-tls
  
  # ── Routing Rules ─────────────────────────────────────────────────────────
  rules:
    - host: ecommerce.local
      http:
        paths:
        - path: /api/auth/
          pathType: Prefix
          backend:
            service:
              name: auth-service
              port:
                number: 8001